<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <meta name="description" content="現在サイトを準備中です。" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --sub: #666666;
      --line: #e8e8e8;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family:
        "Helvetica Neue",
        Arial,
        "Hiragino Kaku Gothic ProN",
        "Hiragino Sans",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wrap {
      width: min(92vw, 760px);
      padding: 48px 24px;
    }

    .logo {
      display: block;
      width: min(360px, 62vw);
      height: auto;
      margin: 0 auto 40px;
    }

    .status {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      letter-spacing: 0.08em;
      line-height: 1.35;
    }

    .divider {
      width: 56px;
      height: 1px;
      background: var(--line);
      margin: 28px auto;
    }

    p {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.9;
      letter-spacing: 0.04em;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 32px 20px;
      }

      .logo {
        margin-bottom: 32px;
      }

      p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img
      class="logo"
      src="https://www.genspark.ai/api/files/s/Gw7sK3Cq"
      alt="JCCPC ロゴ"
    />

    <div class="status">Under Construction</div>
    <h1>現在、サイトを準備中です。</h1>
    <div class="divider"></div>
    <p>
      ご訪問いただきありがとうございます。<br />
      公開まで、今しばらくお待ちください。
    </p>
  </main>
</body>
</html>
