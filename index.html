<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JCCPC | Under Construction</title>
  <meta name="description" content="現在サイトを準備中です。" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --sub: #777777;
      --line: #e5e5e5;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        "Helvetica Neue",
        Arial,
        "Hiragino Sans",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: min(92vw, 760px);
      padding: 48px 24px 56px;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(360px, 64vw);
      height: auto;
      margin: 0 auto 40px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 500;
      letter-spacing: 0.08em;
      line-height: 1.4;
    }

    .divider {
      width: 52px;
      height: 1px;
      background: var(--line);
      margin: 26px auto;
    }

    p {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.9;
      letter-spacing: 0.03em;
    }

    @media (max-width: 640px) {
      .container {
        padding: 32px 20px 44px;
      }

      .logo {
        width: min(300px, 72vw);
        margin-bottom: 32px;
      }

      p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <img class="logo" src="./image.png" alt="JCCPC ロゴ" />
    <div class="label">Under Construction</div>
    <h1>現在、サイトを準備中です。</h1>
    <div class="divider"></div>
    <p>
      ご訪問いただきありがとうございます。<br />
      公開まで今しばらくお待ちください。
    </p>
  </main>
</body>
</html>
